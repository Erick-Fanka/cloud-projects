<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula Cloud Computing</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #38bdf8;
            --text: #f8fafc;
            --github: #333;
            --linkedin: #0077b5;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg);
            background-image: radial-gradient(circle at 50% -20%, #1e293b, #0f172a);
            color: var(--text); 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            animation: fadeIn 0.8s ease-in-out;
        }

        h1 { 
            font-size: 3rem; 
            font-weight: 800;
            margin-bottom: 10px;
            color: #fff;
            text-shadow: 0 0 20px rgba(56, 189, 248, 0.4);
            letter-spacing: -1px;
        }

        .subtitle { 
            color: #94a3b8; 
            font-size: 1.1rem; 
            margin-bottom: 40px; 
        }

        .card-container { 
            display: flex; 
            justify-content: center; 
            gap: 25px; 
            width: 100%;
            max-width: 1000px;
            margin-bottom: 60px;
        }

        .card { 
            background: var(--card); 
            padding: 40px 30px; 
            border-radius: 20px; 
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 300px; 
            text-decoration: none; 
            color: white; 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        .card:hover { 
            transform: translateY(-12px); 
            border-color: var(--accent);
            box-shadow: 0 20px 40px -10px rgba(56, 189, 248, 0.3);
            background: #243146;
        }

        .card h3 { 
            font-size: 1.5rem; 
            margin-bottom: 15px; 
            color: var(--accent); 
            font-weight: 600;
        }

        .card p { font-size: 0.95rem; color: #cbd5e1; }

        .lab-card {
            border: 1px solid rgba(255, 153, 0, 0.3);
            background: linear-gradient(135deg, #1e293b 0%, #232f3e 100%);
        }
        .lab-card:hover { border-color: #ff9900; }
        .lab-card h3 { color: #ff9900 !important; }

        /* SEÇÃO SOCIAL */
        .social-links {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }

        .social-icon {
            width: 50px;
            height: 50px;
            background: var(--card);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-decoration: none;
            font-size: 1.5rem;
            transition: 0.3s;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .social-icon:hover {
            transform: scale(1.2);
            color: #fff;
        }

        .social-icon.github:hover { 
            background: var(--github); 
            box-shadow: 0 0 15px rgba(255,255,255,0.2);
        }

        .social-icon.linkedin:hover { 
            background: var(--linkedin);
            box-shadow: 0 0 15px rgba(0, 119, 181, 0.4);
        }

        @media (max-width: 768px) {
            .card-container { flex-direction: column; align-items: center; }
            h1 { font-size: 2.2rem; }
        }
    </style>
</head>
<body>

    <h1>☁️ Aula Cloud Computing</h1>
    <p class="subtitle">Acesso rápido aos materiais e laboratórios:</p>

    <div class="card-container">
        <a href="apresentacao1/index.html" class="card">
            <h3>Teoria 1</h3>
            <p>Introdução e Fundamentos de Cloud Computing</p>
        </a>

        <a href="apresentacao2/index.html" class="card">
            <h3>Teoria 2</h3>
            <p>Principais Serviços e Modelos (IaaS, PaaS, SaaS)</p>
        </a>

        <a href="https://www.awsacademy.com/vforcesite/LMS_Login" target="_blank" class="card lab-card">
            <div class="lab-badge">MÃO NA MASSA</div>
            <h3>Laboratório</h3>
            <p>Login no Console AWS Academy para prática real.</p>
        </a>
    </div>

    <div class="social-links">
        <a href="https://github.com/Erick-Fanka" target="_blank" class="social-icon github" title="GitHub">
            <i class="fab fa-github"></i>
        </a>
        <a href="https://www.linkedin.com/in/erick-fanka/" target="_blank" class="social-icon linkedin" title="LinkedIn">
            <i class="fab fa-linkedin-in"></i>
        </a>
    </div>

</body>
</html>
